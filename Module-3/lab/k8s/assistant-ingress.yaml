apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aiops-assistant-ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
spec:
  rules:
  - host: aiops.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: aiops-assistant-service
            port:
              number: 8501
